# Block scanners probing for scripts (.php, .asp, .env, .git, etc.)
# Bans IP after 3 hits within 10 minutes
# Ban lasts 24 hours — scanners rarely need a second chance

[nginx-script-scan]
enabled  = true
port     = http,https
filter   = nginx-script-scan
logpath  = /var/log/nginx/access.log
backend  = auto

maxretry = 3
findtime = 600
bantime  = 86400
