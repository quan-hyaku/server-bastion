# SSH brute-force protection
# Bans IP after 5 failed login attempts within 10 minutes
# Ban lasts 1 hour, increases on repeat offenders

[sshd]
enabled  = true
port     = ssh
filter   = sshd
logpath  = /var/log/auth.log
backend  = auto

maxretry = 5
findtime = 600
bantime  = 3600

# Increase ban time for repeat offenders
bantime.increment = true
bantime.factor    = 2
bantime.maxtime   = 86400
