# Fail2ban filter for nginx script/path scanning
# Matches requests for common exploit targets in nginx access logs
#
# Log format expected: standard combined format
#   <IP> - - [date] "METHOD /path HTTP/x.x" status ...

[Definition]

# Match requests for suspicious file extensions and paths
failregex = ^<HOST> -.*"(GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH) .+\.(php|asp|aspx|jsp|cgi|pl|py|rb|sh|bash|exe|dll|bat|cmd|com|vbs|ws|wsf|scr|pif)\b
            ^<HOST> -.*"(GET|POST|HEAD) .+\.(env|git|svn|hg|bzr|htaccess|htpasswd|DS_Store|npmrc|dockerenv)\b
            ^<HOST> -.*"(GET|POST|HEAD) .+/(wp-login|wp-admin|wp-content|wp-includes|wp-config|xmlrpc)\.?(php)?\b
            ^<HOST> -.*"(GET|POST|HEAD) .+/(phpmyadmin|pma|myadmin|mysql|adminer|dbadmin)\b
            ^<HOST> -.*"(GET|POST|HEAD) .+/(\.aws|\.ssh|\.config|\.local|config\.json|credentials)\b
            ^<HOST> -.*"(GET|POST|HEAD) .+/(vendor|node_modules|composer\.(json|lock)|package\.json)\b
            ^<HOST> -.*"(GET|POST|HEAD) .+/\.(git|svn|env|docker)/

ignoreregex =
