# Fail2ban filter for nginx bot/vulnerability scanners
# Matches requests that return 404 for known exploit paths
#
# Log format expected: standard combined format
#   <IP> - - [date] "METHOD /path HTTP/x.x" status ...

[Definition]

# Match 404 responses for common scanner targets
failregex = ^<HOST> -.*"(GET|POST|HEAD) .+/(wp-login\.php|wp-admin|wp-content/uploads|wp-cron\.php|xmlrpc\.php).* (404|403)
            ^<HOST> -.*"(GET|POST|HEAD) .+/(administrator|admin|login|panel|manager|console|dashboard).* (404|403)
            ^<HOST> -.*"(GET|POST|HEAD) .+/(phpinfo|info\.php|test\.php|shell|cmd|eval|backdoor).* (404|403)
            ^<HOST> -.*"(GET|POST|HEAD) .+/(cgi-bin|scripts|bin|tmp|temp|backup|bak|old|orig).* (404|403)
            ^<HOST> -.*"(GET|POST|HEAD) .+\.(sql|sql\.gz|sql\.bz2|sql\.zip|tar\.gz|zip|rar|7z|bak|backup|dump).* (404|403)

ignoreregex =
